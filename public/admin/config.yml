backend:
  name: git-gateway
  branch: master

# Global slug settings
slug:
  encoding: "ascii"
  clean_accents: true
  sanitize_replacement: "-"

local_backend: true

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "settings"
    label: "Configurações"
    files:
      - label: "Configurações do Site"
        name: "site"
        file: "src/content/settings/site.json"
        fields:
          - { label: "Nome do Site", name: "siteName", widget: "string" }
          - { label: "Descrição", name: "description", widget: "text" }
          - label: "Hero"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Título", name: "title", widget: "string" }
              - { label: "Subtítulo", name: "subtitle", widget: "text" }
              - { label: "Descrição", name: "description", widget: "text" }
              - { label: "Imagem", name: "image", widget: "image" }
          - label: "Redes Sociais"
            name: "social"
            widget: "object"
            fields:
              - {
                  label: "Instagram",
                  name: "instagram",
                  widget: "string",
                  required: false,
                }
              - {
                  label: "Facebook",
                  name: "facebook",
                  widget: "string",
                  required: false,
                }
              - {
                  label: "LinkedIn",
                  name: "linkedin",
                  widget: "string",
                  required: false,
                }
              - {
                  label: "Pinterest",
                  name: "pinterest",
                  widget: "string",
                  required: false,
                }
          - label: "Contato"
            name: "contact"
            widget: "object"
            fields:
              - {
                  label: "Imagem de fundo",
                  name: "background",
                  widget: "image",
                  required: false,
                }
              - { label: "Email", name: "email", widget: "string" }
              - {
                  label: "Telefone",
                  name: "phone",
                  widget: "string",
                  required: false,
                }
              - {
                  label: "WhatsApp",
                  name: "whatsapp",
                  widget: "string",
                  required: false,
                }
              - {
                  label: "Formulário de orçamento",
                  name: "quoteFormUrl",
                  widget: "string",
                  required: false,
                }

  - name: "projects"
    label: "Projetos"
    folder: "src/content/projects"
    create: true
    slug: "{{fields.title}}"
    fields:
      - { label: "Título", name: "title", widget: "string" }
      - { label: "Descrição", name: "description", widget: "text" }
      - { label: "Data", name: "date", widget: "datetime" }
      - {
          label: "Categoria",
          name: "category",
          widget: "select",
          options: ["Residencial", "Comercial", "Corporativo", "Hospitality"],
        }
      - { label: "Imagem Principal", name: "image", widget: "image" }
      - {
          label: "Destacar no Home",
          name: "featured",
          widget: "boolean",
          default: false,
        }
      - {
          label: "Galeria",
          name: "gallery",
          widget: "list",
          field: { label: "Imagem", name: "image", widget: "image" },
          required: false,
        }
      - { label: "Conteúdo", name: "body", widget: "markdown" }

  - name: "services"
    label: "Serviços"
    folder: "src/content/services"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Título", name: "title", widget: "string" }
      - { label: "Descrição", name: "description", widget: "text" }
      - {
          label: "Ícone",
          name: "icon",
          widget: "select",
          options:
            ["home", "building", "palette", "ruler", "lightbulb", "sofa"],
        }
      - { label: "Ordem", name: "order", widget: "number", default: 1 }
      - { label: "Conteúdo", name: "body", widget: "markdown" }
